    <div id="root"></div>
    <!-- TikTok Embed Script (lazy-load after page interaction) -->
    <script>
      // Lazy load TikTok embed only after user interaction to reduce initial load
      let _tiktokLoaded = false;
      const loadTikTok = () => {
        if (_tiktokLoaded) return;
        const s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.tiktok.com/embed.js';
        document.body.appendChild(s);
        _tiktokLoaded = true;
      };
      ['scroll','mousemove','touchstart','keydown'].forEach(evt => {
        window.addEventListener(evt, loadTikTok, { once: true, passive: true });
      });
    </script>
<script type="module" src="/index.tsx"></script>
</body>
